name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm release:smoke

      - run: pnpm build:sea

      - run: pnpm release:smoke:sea

      - name: Rename release binary
        shell: bash
        run: |
          node --input-type=module -e "
          import { renameSync, existsSync } from 'node:fs';
          import { join } from 'node:path';
          const ext = process.platform === 'win32' ? '.exe' : '';
          const src = join('release', 'ccbudget' + ext);
          const dest = join('release', 'ccbudget-' + process.platform + '-' + process.arch + ext);
          if (!existsSync(src)) throw new Error('missing ' + src);
          renameSync(src, dest);
          "

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/ccbudget-*

  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm release:smoke

      - name: Check npm token presence
        id: npm_token
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not configured; skipping npm publish."
          fi

      - name: Resolve package version
        id: package_version
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm version availability
        id: npm_version
        shell: bash
        run: |
          if npm view "ccbudget@${{ steps.package_version.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version ccbudget@${{ steps.package_version.outputs.version }} already exists; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: pnpm publish --access public --no-git-checks
        if: steps.npm_token.outputs.present == 'true' && steps.npm_version.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
